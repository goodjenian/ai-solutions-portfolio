services:

  # -------------------------------------------------------
  # Optional: Redis for distributed rate limiting
  # Remove if you don't need multi-instance rate limiting
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # StrategyAI — Marketing Strategy (port 8001)
  # -------------------------------------------------------
  strategyai:
    build:
      context: .
      dockerfile: docker/Dockerfile.strategyai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -------------------------------------------------------
  # ContentFlow — Instagram/Social Post Generator (port 8002)
  # -------------------------------------------------------
  contentflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.contentflow
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # -------------------------------------------------------
  # MeetingOps — Meeting Summarizer (port 8004)
  # -------------------------------------------------------
  meetingops:
    build:
      context: .
      dockerfile: docker/Dockerfile.meetingops
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

