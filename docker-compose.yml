services:

  # -------------------------------------------------------
  # Optional: Redis for distributed rate limiting
  # Remove if you don't need multi-instance rate limiting
  # -------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # StrategyAI — Marketing Strategy (port 8001)
  # -------------------------------------------------------
  strategyai:
    build:
      context: .
      dockerfile: docker/Dockerfile.strategyai
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -------------------------------------------------------
  # ContentFlow — Instagram/Social Post Generator (port 8002)
  # -------------------------------------------------------
  contentflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.contentflow
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # -------------------------------------------------------
  # InboxAI — Email Auto-Responder (port 8003)
  # IMPORTANT: Requires Gmail OAuth files mounted as volumes
  # Run: python setup_gmail_oauth.py  before first start
  # -------------------------------------------------------
  inboxai:
    build:
      context: .
      dockerfile: docker/Dockerfile.inboxai
    restart: unless-stopped
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Mount Gmail OAuth tokens — generated by setup_gmail_oauth.py
      - ./secrets/gmail_credentials.json:/app/productivity/email_auto_responder_flow/credentials.json:ro
      - ./secrets/gmail_token.json:/app/productivity/email_auto_responder_flow/token.json:rw
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -------------------------------------------------------
  # MeetingOps — Meeting Summarizer (port 8004)
  # -------------------------------------------------------
  meetingops:
    build:
      context: .
      dockerfile: docker/Dockerfile.meetingops
    restart: unless-stopped
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # -------------------------------------------------------
  # TradAI — Stock Analysis (port 8005)
  # -------------------------------------------------------
  tradai:
    build:
      context: .
      dockerfile: docker/Dockerfile.tradai
    restart: unless-stopped
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
