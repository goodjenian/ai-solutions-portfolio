version: "3.9"

# Isolated execution environment for cyber-security-llm-agents
# This container has no access to the host filesystem beyond llm_working_folder

services:
  agents:
    build: .
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL_NAME=${OPENAI_MODEL_NAME:-gpt-3.5-turbo-0125}
      - CALDERA_SERVER=${CALDERA_SERVER}
      - CALDERA_API_KEY=${CALDERA_API_KEY}
      - LLM_WORKING_FOLDER=/app/llm_working_folder
      - SANDBOX_ENABLED=true
    volumes:
      # Only expose the working folder — NOT the host root
      - ./llm_working_folder:/app/llm_working_folder
    network_mode: "none"   # No network access by default (use bridge for Caldera scenarios)
    read_only: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
